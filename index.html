<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>IMC</title>
</head>
<body>
    <div class="container">
        <div class="container-info">
            <div class="container-info-left">
                <h1>IMC</h1>
                <p>Menor que 18,5 <br>
                Entre 18,5 e 24,9 <br>
                Entre 25,0 e 29,9 <br>
                Entre 30,0 e 39,9 <br>
                Maior que 40,0</p>
            </div>
            <div class="container-info-right">
                <h1>Classificação</h1>
                <p>Magreza <br>
                Normal     <br>
                Sobrepeso  <br>
                Obesidade  <br>
                Obesidade Grave</p>
            </div>
        </div>
        <div class="container-input">
            <h1>Calcule seu IMC</h1>
        <input id="peso" type="text" placeholder="Digite seu peso">
        <input id="altura" type="text" placeholder="Digite sua altura">
        <button onclick="calcImc()">Confirmar</button>
        </div>
        <h1 id="resp">RESPOSTA AQUI</h1>
    </div>
    <script src="script.js"></script>
</body>
</html>
