<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Timer</title>
</head>
<body>
    <div class="container">
        <h1 id="title">Meu timer</h1>
        <div class="time">
            <h1 id="hour">00</h1>
            <h1>:</h1>
            <h1 id="minute">00</h1>
            <h1>:</h1>
            <h1 id="second">00</h1>
        </div>
        <div class="buttons">
            <button onclick="start()">Iniciar</button>
            <button onclick="pause()">Pausar</button>
            <button onclick="clearTimer()">Zerar</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
